<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Products | Ashish Gems
    </title>

    <meta
        name="description"
        content="Browse premium silver products from Ashish Gems.">

    <link
        rel="stylesheet"
        href="assets/css/style.css">

    <link
        rel="stylesheet"
        href="assets/css/responsive.css">

</head>

<body>

    <!-- ===========================
         HEADER
    ============================ -->

    <header class="header">

        <div class="container">

            <nav class="navbar">

                <a
                    href="index.html"
                    class="logo">

                    Ashish <span>Gems</span>

                </a>

                <ul class="nav-menu">

                    <li>
                        <a href="index.html">
                            Home
                        </a>
                    </li>

                    <li>
                        <a
                            href="products.html"
                            class="active">
                            Products
                        </a>
                    </li>

                    <li>
                        <a href="index.html#collections">
                            Categories
                        </a>
                    </li>

                    <li>
                        <a href="index.html#about">
                            About
                        </a>
                    </li>

                    <li>
                        <a href="index.html#contact">
                            Contact
                        </a>
                    </li>

                </ul>

            </nav>

        </div>

    </header>

    <!-- ===========================
         PAGE TITLE
    ============================ -->

    <section class="page-header">

        <div class="container">

            <h1>

                Silver Collection

            </h1>

            <p>

                Browse our handcrafted premium silver products.

            </p>

        </div>

    </section>

    <!-- ===========================
         FILTER BAR
    ============================ -->

    <section class="filters">

        <div class="container">

            <div class="filter-bar">

                <input
                    id="searchInput"
                    type="text"
                    placeholder="Search products...">

                <select id="categoryFilter">

                    <option value="all">

                        All Categories

                    </option>

                </select>

                <select id="sortSelect">

                    <option value="default">

                        Sort By

                    </option>

                    <option value="featured">

                        Featured

                    </option>

                    <option value="name">

                        Name A-Z

                    </option>

                    <option value="weight">

                        Weight Low → High

                    </option>

                    <option value="weight-desc">

                        Weight High → Low

                    </option>

                </select>

            </div>

        </div>

    </section>

    <!-- ===========================
         PRODUCTS
    ============================ -->

    <main class="products-section">

        <div class="container">

            <div class="products-header">

                <h2>

                    Our Collection

                </h2>

                <span id="productCount">

                    Loading...

                </span>

            </div>

            <div
                id="loading"
                class="loading">

                Loading products...

            </div>

            <div
                id="productGrid"
                class="product-grid">

            </div>

            <div class="load-more-wrapper">

                <button
                    id="loadMoreBtn"
                    class="btn btn-primary">

                    Load More Products

                </button>

            </div>

        </div>

    </main>

    <!-- ===========================
         PRODUCT MODAL
    ============================ -->

    <div
        id="productModal"
        class="modal">

        <div class="modal-content">

            <button
                id="closeModal"
                class="modal-close"
                aria-label="Close">

                ×

            </button>

            <div id="modalBody">

            </div>

        </div>

    </div>

    <!-- ===========================
         BACK TO TOP
    ============================ -->

    <button
        id="backToTop"
        class="back-to-top"
        aria-label="Back To Top">

        ↑

    </button>

    <!-- ===========================
         FOOTER
    ============================ -->

    <footer class="footer">

        <div class="container">

            <p>

                © 2026 Ashish Gems.
                All Rights Reserved.

            </p>

        </div>

    </footer>

    <!-- ===========================
         JAVASCRIPT
    ============================ -->

    <script
        src="assets/js/navigation.js">
    </script>

    <script
        src="assets/js/products.js">
    </script>

</body>

</html>
